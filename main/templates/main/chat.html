{% extends "main/base.html" %}
{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

:root {
  --green: #00ff9c;
  --bg: #000;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--green);
  font-family: 'VT323', monospace;
}

/* 🔥 FIX: use min-height instead of fixed height */
.terminal {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* header */
.header {
  padding: 10px;
  border-bottom: 1px solid #00aa66;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

/* chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

/* messages */
.msg { 
  margin: 8px 0; 
  word-wrap: break-word;  /* 🔥 important for mobile */
}

.user { color: #66ffcc; }
.ai { color: #00ffaa; }

/* input section */
.input-box {
  position: sticky;   /* 🔥 keeps visible */
  bottom: 0;
  background: black;
  padding: 10px;
  border-top: 1px solid #00aa66;
}

/* input */
.input-box input {
  flex: 1;
  background: black;
  color: #00ff9c;
  border: none;
  outline: none;
  font-size: 16px;  /* 🔥 prevents zoom on mobile */
}

/* button */
.input-box button {
  border: 1px solid #00ff9c;
  padding: 5px 10px;
}

/* 🔊 button */
.speak-btn {
  margin-left: 10px;
  cursor: pointer;
  border: 1px solid var(--green);
  padding: 2px 6px;
}

/* 📱 MOBILE FIX */
@media (max-width: 600px) {
  .header {
    font-size: 12px;
  }

  .chat {
    padding: 10px;
  }
}
</style>

<div class="terminal">

  <!-- Header -->
  <div class="header">
    <div>root@chitty</div>
    <div>{{ request.user.username }}</div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chatBox">
    {% for chat in chats %}
      <div class="msg user">➜ {{ chat.message }}</div>

      <div class="msg ai">
        🤖 {{ chat.response|linebreaksbr }}

        <button class="speak-btn" onclick="speakText('{{ chat.response|escapejs }}')">
          🔊
        </button>
      </div>
    {% endfor %}
  </div>

  <!-- Input -->
  <div class="input-box">
    <form method="POST" style="display:flex; gap:10px;">
      {% csrf_token %}
      <input type="text" name="query" placeholder="Type message..." required>
      <button type="submit">Send</button>
    </form>
  </div>

</div>

<script>
let voices = [];

function speakText(text) {
    if (!text) return;

    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.voice = voices.find(v => v.name.includes("Google")) || voices[0];
    speech.rate = 0.95;
    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
}

function loadVoices() {
    voices = speechSynthesis.getVoices();
}

window.onload = function() {
    setTimeout(loadVoices, 200);

    let chat = document.getElementById("chatBox");
    chat.scrollTop = chat.scrollHeight;
};

speechSynthesis.onvoiceschanged = loadVoices;
</script>

{% endblock %}
