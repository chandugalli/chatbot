{% extends "main/base.html" %}
{% block content %}

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

:root {
  --green: #00ff9c;
  --bg: #000;
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg);
  color: var(--green);
  font-family: 'VT323', monospace;
}

.terminal {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 10px;
  border-bottom: 1px solid #00aa66;
  display: flex;
  justify-content: space-between;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.msg { margin: 10px 0; }
.user { color: #66ffcc; }
.ai { color: #00ffaa; }

.speak-btn {
  margin-left: 10px;
  cursor: pointer;
  border: 1px solid var(--green);
  padding: 2px 6px;
}
</style>

<div class="terminal">

  <!-- Header -->
  <div class="header">
    <div>root@chitty</div>
    <div>{{ request.user.username }}</div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chatBox">
    {% for chat in chats %}
      <div class="msg user">➜ {{ chat.message }}</div>

      <div class="msg ai">
        🤖 {{ chat.response|linebreaksbr }}

        <!-- 🔊 SPEAK BUTTON -->
        <button class="speak-btn" onclick="speakText(`{{ chat.response|escapejs }}`)">
          🔊
        </button>
      </div>
    {% endfor %}
  </div>

  <!-- Input -->
  <div class="p-3 border-t border-green-500">
    <form method="POST" style="display:flex; gap:10px;">
      {% csrf_token %}
      <input type="text" name="query" style="flex:1; background:black; color:#00ff9c; border:none;" required>
      <button type="submit" style="border:1px solid #00ff9c;">Send</button>
    </form>
  </div>

</div>

<script>
let voices = [];

// 🔊 SPEAK FUNCTION
function speakText(text) {
    if (!text) return;

    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);

    // choose best voice
    speech.voice = voices.find(v => v.name.includes("Google")) || voices[0];

    speech.rate = 0.95;
    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
}

// 🎛 LOAD VOICES
function loadVoices() {
    voices = speechSynthesis.getVoices();
}

// INIT
window.onload = function() {
    setTimeout(loadVoices, 200);

    let chat = document.getElementById("chatBox");
    chat.scrollTop = chat.scrollHeight;
};

speechSynthesis.onvoiceschanged = loadVoices;
</script>

{% endblock %}
